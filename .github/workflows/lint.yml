# Goal - whenever some updation in python code then to check - syntax, format, indentation --> Basically to check the Linting
name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
     # this step will automatically clone the code of the current branch into the runner
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7
     # this step will install teh linting tool
      - name: Install Linter
        run: pip install ruff
        
